<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍜 ASIATIQ — Рамэн Тренер</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #58CC02;
    --green-dark: #45a001;
    --green-light: #d7f5b1;
    --blue: #1CB0F6;
    --blue-dark: #0a9ad6;
    --red: #FF4B4B;
    --red-light: #FFE0E0;
    --yellow: #FFD900;
    --yellow-dark: #e5c300;
    --orange: #FF9600;
    --purple: #CE82FF;
    --gray: #AFAFAF;
    --gray-light: #F7F7F7;
    --dark: #1f1f1f;
    --text: #3C3C3C;
    --text-muted: #777;
    --border: #E5E5E5;
    --white: #FFFFFF;
    --card-shadow: 0 4px 0 rgba(0,0,0,0.12);
    --radius: 12px;
    --radius-lg: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito', sans-serif;
    background: #f0f8e8;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* SCREENS */
  .screen { display: none; min-height: 100vh; }
  .screen.active { display: flex; flex-direction: column; }

  /* ======= HOME SCREEN ======= */
  #home {
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    color: white;
    padding: 0;
  }

  .home-header {
    padding: 2rem 1.5rem 1rem;
    text-align: center;
    position: relative;
  }

  .logo-bowl { font-size: 4rem; line-height: 1; margin-bottom: 0.5rem; animation: steam 2s ease-in-out infinite; }
  @keyframes steam {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  .logo-title {
    font-size: 1.8rem;
    font-weight: 900;
    letter-spacing: 2px;
    background: linear-gradient(90deg, #FFD900, #FF9600);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.25rem;
  }

  .logo-sub { font-size: 0.9rem; color: rgba(255,255,255,0.6); letter-spacing: 1px; font-weight: 600; }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    padding: 1rem 1.5rem;
    background: rgba(255,255,255,0.05);
    margin: 0 1.5rem;
    border-radius: var(--radius-lg);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .stat-item { text-align: center; }
  .stat-icon { font-size: 1.4rem; }
  .stat-value { font-size: 1.1rem; font-weight: 800; color: white; }
  .stat-label { font-size: 0.65rem; color: rgba(255,255,255,0.5); font-weight: 600; letter-spacing: 0.5px; }

  .section-label {
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: rgba(255,255,255,0.4);
    padding: 1.5rem 1.5rem 0.75rem;
    text-transform: uppercase;
  }

  .recipe-list { padding: 0 1.5rem 2rem; display: flex; flex-direction: column; gap: 0.75rem; flex: 1; overflow-y: auto; }

  .recipe-card {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius-lg);
    padding: 1rem 1.25rem;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: relative;
    overflow: hidden;
  }

  .recipe-card::after {
    content: '→';
    position: absolute;
    right: 1.25rem;
    font-size: 1.2rem;
    color: rgba(255,255,255,0.3);
    transition: transform 0.15s;
  }

  .recipe-card:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }
  .recipe-card:hover::after { transform: translateX(3px); }
  .recipe-card:active { transform: scale(0.98); }

  .recipe-emoji { font-size: 2.5rem; flex-shrink: 0; }

  .recipe-info { flex: 1; }
  .recipe-name { font-size: 0.95rem; font-weight: 800; color: white; line-height: 1.2; }
  .recipe-desc { font-size: 0.75rem; color: rgba(255,255,255,0.5); margin-top: 0.25rem; font-weight: 600; }
  .recipe-progress { margin-top: 0.5rem; height: 5px; background: rgba(255,255,255,0.1); border-radius: 99px; overflow: hidden; }
  .recipe-progress-fill { height: 100%; background: var(--green); border-radius: 99px; transition: width 0.5s ease; }

  .btn-modes {
    padding: 0 1.5rem 1.5rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  .mode-btn {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: var(--radius);
    padding: 1rem;
    color: white;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .mode-btn:hover { background: rgba(255,255,255,0.14); }
  .mode-btn .mode-icon { font-size: 1.6rem; }
  .mode-btn .mode-label { color: rgba(255,255,255,0.6); font-size: 0.7rem; font-weight: 600; }

  /* ======= LESSON SCREEN ======= */
  #lesson { background: white; }

  .lesson-top {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.2rem 1.5rem;
    border-bottom: 2px solid var(--border);
    position: sticky;
    top: 0;
    background: white;
    z-index: 10;
  }

  .btn-close {
    background: none;
    border: none;
    font-size: 1.4rem;
    cursor: pointer;
    color: var(--gray);
    padding: 0.25rem;
    border-radius: 8px;
    transition: background 0.1s;
    line-height: 1;
  }
  .btn-close:hover { background: var(--gray-light); }

  .progress-track {
    flex: 1;
    height: 16px;
    background: var(--border);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--green);
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  .hearts { display: flex; gap: 4px; font-size: 1.1rem; flex-shrink: 0; }
  .heart { transition: transform 0.2s; }
  .heart.lost { filter: grayscale(1); opacity: 0.3; transform: scale(0.9); }

  /* TIMER */
  .timer-wrap {
    position: relative;
    width: 44px;
    height: 44px;
    flex-shrink: 0;
  }
  .timer-svg { transform: rotate(-90deg); }
  .timer-bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .timer-arc {
    fill: none;
    stroke: var(--green);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.9s linear, stroke 0.3s;
  }
  .timer-arc.warn  { stroke: var(--orange); }
  .timer-arc.danger { stroke: var(--red); }
  .timer-num {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.8rem;
    font-weight: 900;
    color: var(--text);
    transition: color 0.3s;
  }
  .timer-num.warn   { color: var(--orange); }
  .timer-num.danger { color: var(--red); }

  @keyframes timerPulse {
    0%,100% { transform: scale(1); }
    50%      { transform: scale(1.12); }
  }
  .timer-wrap.pulse { animation: timerPulse 0.5s ease; }

  .lesson-body {
    flex: 1;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    overflow-y: auto;
  }

  .question-type {
    font-size: 0.75rem;
    font-weight: 800;
    letter-spacing: 1px;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .question-text {
    font-size: 1.25rem;
    font-weight: 800;
    line-height: 1.4;
    color: var(--text);
  }

  .question-emoji { font-size: 3rem; text-align: center; margin: 0.5rem 0; }

  .options-grid {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-top: 0.5rem;
  }

  .option-btn {
    background: white;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem 1.25rem;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
    cursor: pointer;
    text-align: left;
    transition: all 0.12s;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    box-shadow: 0 3px 0 var(--border);
  }

  .option-btn:hover:not(:disabled) { border-color: var(--blue); background: #EAF6FF; box-shadow: 0 3px 0 var(--blue); }
  .option-btn.selected { border-color: var(--blue); background: #EAF6FF; box-shadow: 0 3px 0 var(--blue); }
  .option-btn.correct { border-color: var(--green); background: var(--green-light); box-shadow: 0 3px 0 var(--green-dark); color: #3a7d01; }
  .option-btn.wrong { border-color: var(--red); background: var(--red-light); box-shadow: 0 3px 0 #cc3333; color: #cc3333; }
  .option-btn:disabled { cursor: default; }

  .option-letter {
    width: 28px; height: 28px;
    border-radius: 8px;
    border: 2px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem;
    font-weight: 800;
    flex-shrink: 0;
    opacity: 0.5;
  }

  .flashcard-container {
    perspective: 1000px;
    flex: 1;
    min-height: 280px;
    cursor: pointer;
  }

  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 0.5s ease;
  }

  .flashcard-container.flipped .flashcard-inner { transform: rotateY(180deg); }

  .flashcard-front, .flashcard-back {
    position: absolute;
    inset: 0;
    border-radius: var(--radius-lg);
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    gap: 1rem;
  }

  .flashcard-front {
    background: linear-gradient(135deg, #1a1a2e, #0f3460);
    color: white;
    border: 2px solid rgba(255,255,255,0.1);
  }

  .flashcard-back {
    background: white;
    border: 2px solid var(--green);
    transform: rotateY(180deg);
  }

  .flashcard-front .fc-emoji { font-size: 4rem; }
  .flashcard-front .fc-name { font-size: 1.3rem; font-weight: 900; color: #FFD900; }
  .flashcard-front .fc-hint { font-size: 0.8rem; color: rgba(255,255,255,0.4); margin-top: 1rem; }

  .flashcard-back .fc-title { font-size: 1rem; font-weight: 800; color: var(--green-dark); }

  .ingredients-list { text-align: left; width: 100%; font-size: 0.8rem; }
  .ing-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid var(--border); }
  .ing-row:last-child { border: none; }
  .ing-name { color: var(--text); font-weight: 600; }
  .ing-amount { color: var(--text-muted); font-weight: 700; font-size: 0.75rem; }

  .fill-blank-input {
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: 0.75rem 1rem;
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    width: 100%;
    transition: border-color 0.15s;
    box-shadow: 0 3px 0 var(--border);
  }
  .fill-blank-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 3px 0 var(--blue); }
  .fill-blank-input.correct { border-color: var(--green); box-shadow: 0 3px 0 var(--green-dark); color: var(--green-dark); }
  .fill-blank-input.wrong { border-color: var(--red); box-shadow: 0 3px 0 #cc3333; color: var(--red); }

  /* ======= FEEDBACK BAR ======= */
  .feedback-bar {
    padding: 1.25rem 1.5rem;
    display: none;
    flex-direction: column;
    gap: 0.5rem;
    border-top: 3px solid var(--border);
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: none; opacity: 1; } }

  .feedback-bar.correct { background: var(--green-light); border-color: var(--green); }
  .feedback-bar.wrong { background: var(--red-light); border-color: var(--red); }

  .feedback-title { font-size: 1.1rem; font-weight: 900; }
  .feedback-bar.correct .feedback-title { color: var(--green-dark); }
  .feedback-bar.wrong .feedback-title { color: var(--red); }
  .feedback-detail { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
  .feedback-bar.wrong .feedback-detail { color: #cc3333; }

  .btn-continue {
    padding: 0.85rem 1.5rem;
    border: none;
    border-radius: var(--radius);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.12s;
    letter-spacing: 0.5px;
  }
  .btn-continue.correct { background: var(--green); color: white; box-shadow: 0 4px 0 var(--green-dark); }
  .btn-continue.correct:hover { transform: translateY(-1px); }
  .btn-continue.correct:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--green-dark); }
  .btn-continue.wrong { background: var(--red); color: white; box-shadow: 0 4px 0 #cc3333; }
  .btn-continue.wrong:hover { transform: translateY(-1px); }

  .lesson-bottom {
    padding: 1.25rem 1.5rem;
    border-top: 2px solid var(--border);
  }

  .btn-check {
    width: 100%;
    padding: 0.9rem;
    border: none;
    border-radius: var(--radius);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    background: var(--green);
    color: white;
    box-shadow: 0 4px 0 var(--green-dark);
    letter-spacing: 0.5px;
    transition: all 0.12s;
  }
  .btn-check:hover { transform: translateY(-1px); }
  .btn-check:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--green-dark); }
  .btn-check:disabled { background: var(--gray-light); color: var(--gray); box-shadow: 0 4px 0 #d0d0d0; cursor: default; transform: none; }

  /* ======= RESULTS SCREEN ======= */
  #results {
    background: linear-gradient(160deg, #1a1a2e 0%, #0f3460 100%);
    color: white;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    gap: 1.5rem;
  }

  .result-trophy { font-size: 5rem; animation: bounce 0.6s ease 0.3s both; }
  @keyframes bounce {
    0% { transform: scale(0); opacity: 0; }
    70% { transform: scale(1.2); }
    100% { transform: scale(1); opacity: 1; }
  }

  .result-title { font-size: 2rem; font-weight: 900; color: #FFD900; }
  .result-sub { font-size: 1rem; color: rgba(255,255,255,0.6); font-weight: 600; }

  .result-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 1rem;
    width: 100%;
    max-width: 400px;
  }

  .result-stat {
    background: rgba(255,255,255,0.08);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 1rem 0.5rem;
  }

  .result-stat-icon { font-size: 1.6rem; }
  .result-stat-value { font-size: 1.4rem; font-weight: 900; color: white; }
  .result-stat-label { font-size: 0.65rem; color: rgba(255,255,255,0.5); font-weight: 700; letter-spacing: 0.5px; }

  .btn-home, .btn-again {
    padding: 0.9rem 2rem;
    border-radius: var(--radius);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    width: 100%;
    max-width: 300px;
    letter-spacing: 0.5px;
    transition: all 0.12s;
    border: none;
  }
  .btn-again { background: var(--green); color: white; box-shadow: 0 4px 0 var(--green-dark); }
  .btn-again:hover { transform: translateY(-1px); }
  .btn-home { background: rgba(255,255,255,0.1); color: white; border: 2px solid rgba(255,255,255,0.2); margin-top: 0.5rem; }
  .btn-home:hover { background: rgba(255,255,255,0.16); }

  /* ======= RECIPE SCREEN ======= */
  #recipe-detail {
    background: white;
  }

  .recipe-header {
    background: linear-gradient(135deg, #1a1a2e, #0f3460);
    color: white;
    padding: 1.5rem;
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .recipe-header .back-btn {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    color: white;
    font-size: 1.2rem;
    padding: 0.4rem 0.7rem;
    cursor: pointer;
    flex-shrink: 0;
    font-family: 'Nunito', sans-serif;
    font-weight: 700;
  }

  .recipe-header .rh-text { flex: 1; }
  .recipe-header .rh-emoji { font-size: 2.5rem; flex-shrink: 0; }
  .recipe-header .rh-name { font-size: 1rem; font-weight: 900; color: #FFD900; line-height: 1.2; }
  .recipe-header .rh-sub { font-size: 0.75rem; color: rgba(255,255,255,0.5); font-weight: 600; }

  .recipe-content { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }

  .section-title {
    font-size: 0.7rem;
    font-weight: 800;
    letter-spacing: 1.5px;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .ing-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  .ing-table th { background: var(--gray-light); padding: 6px 10px; text-align: left; font-size: 0.7rem; font-weight: 800; letter-spacing: 0.5px; color: var(--text-muted); }
  .ing-table th:not(:first-child) { text-align: right; }
  .ing-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); font-weight: 600; }
  .ing-table td:not(:first-child) { text-align: right; color: var(--text-muted); font-weight: 700; font-size: 0.8rem; }
  .ing-table tr:last-child td { border: none; }

  .tech-block {
    background: var(--gray-light);
    border-radius: var(--radius);
    padding: 1rem;
    font-size: 0.85rem;
    line-height: 1.6;
    font-weight: 600;
    color: var(--text);
  }

  .step-list { display: flex; flex-direction: column; gap: 0.75rem; }
  .step-item { display: flex; gap: 0.75rem; align-items: flex-start; }
  .step-num { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #1a1a2e, #0f3460); color: #FFD900; font-size: 0.75rem; font-weight: 900; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .step-text { font-size: 0.85rem; font-weight: 600; line-height: 1.5; color: var(--text); flex: 1; }

  .recipe-actions { padding: 1.25rem; border-top: 2px solid var(--border); display: flex; flex-direction: column; gap: 0.75rem; }

  .btn-study {
    width: 100%;
    padding: 0.9rem;
    border: none;
    border-radius: var(--radius);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.12s;
    letter-spacing: 0.5px;
  }

  .btn-study.primary { background: var(--green); color: white; box-shadow: 0 4px 0 var(--green-dark); }
  .btn-study.primary:hover { transform: translateY(-1px); }
  .btn-study.secondary { background: var(--gray-light); color: var(--text); border: 2px solid var(--border); }
  .btn-study.secondary:hover { background: var(--border); }

  /* ======= XP POPUP ======= */
  .xp-popup {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: #FFD900;
    color: #7a5800;
    font-weight: 900;
    font-size: 1rem;
    padding: 0.5rem 1rem;
    border-radius: 99px;
    opacity: 0;
    transition: all 0.4s ease;
    pointer-events: none;
    z-index: 100;
    font-family: 'Nunito', sans-serif;
  }
  .xp-popup.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ======= SHAKE ANIMATION ======= */
  @keyframes shake {
    0%, 100% { transform: none; }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }
  .shake { animation: shake 0.4s ease; }
</style>
</head>
<body>

<!-- XP Popup -->
<div class="xp-popup" id="xpPopup">+10 XP ⭐</div>

<!-- ===== HOME SCREEN ===== -->
<div class="screen active" id="home">
  <div class="home-header">
    <div class="logo-bowl">🍜</div>
    <div class="logo-title">ASIATIQ TRAINER</div>
    <div class="logo-sub">РАМЭН • АКАДЕМИЯ</div>
  </div>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-icon">🔥</div>
      <div class="stat-value" id="streakDisplay">0</div>
      <div class="stat-label">Серия</div>
    </div>
    <div class="stat-item">
      <div class="stat-icon">⭐</div>
      <div class="stat-value" id="xpDisplay">0</div>
      <div class="stat-label">Очки</div>
    </div>
    <div class="stat-item">
      <div class="stat-icon">✅</div>
      <div class="stat-value" id="correctDisplay">0</div>
      <div class="stat-label">Верных</div>
    </div>
  </div>

// ===== SCREEN NAVIGATION =====
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showHome() {
  renderHome();
  showScreen('home');
}

function confirmClose() {
  if (confirm('Выйти из урока? Прогресс будет потерян.')) { stopTimer(); showHome(); }
}

// ===== HOME RENDER =====
function renderHome() {
  document.getElementById('streakDisplay').textContent = state.streak;
  document.getElementById('xpDisplay').textContent = state.xp;
  document.getElementById('correctDisplay').textContent = state.correct;

  const list = document.getElementById('recipeList');
  list.innerHTML = RECIPES.map(r => {
    const prog = state.recipeProgress[r.id] || 0;
    return `
      <div class="recipe-card" onclick="showRecipeDetail(${r.id})">
        <div class="recipe-emoji">${r.emoji}</div>
        <div class="recipe-info">
          <div class="recipe-name">${r.name}</div>
          <div class="recipe-desc">${r.sub}</div>
          <div class="recipe-progress">
            <div class="recipe-progress-fill" style="width: ${prog}%"></div>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

// ===== RECIPE DETAIL =====
let currentRecipeId = 0;

function showRecipeDetail(id) {
  currentRecipeId = id;
  const r = RECIPES[id];
  document.getElementById('rdEmoji').textContent = r.emoji;
  document.getElementById('rdName').textContent = r.name;
  document.getElementById('rdSub').textContent = r.sub;

  const content = document.getElementById('rdContent');
  content.innerHTML = `
    <div>
      <div class="section-title">Ингредиенты</div>
      <table class="ing-table">
        <thead><tr><th>Наименование</th><th>Бол.</th><th>Мал.</th></tr></thead>
        <tbody>
          ${r.ingredients.map(i => `<tr><td>${i.name}</td><td>${i.big}</td><td>${i.small}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div>
      <div class="section-title">Технология приготовления</div>
      <div class="step-list">
        ${r.steps.map((s, i) => `
          <div class="step-item">
            <div class="step-num">${i + 1}</div>
            <div class="step-text">${s}</div>
          </div>
        `).join('')}
      </div>
    </div>
    <div>
      <div class="section-title">Выход</div>
      <div class="tech-block">${r.output}</div>
    </div>
  `;

  showScreen('recipe-detail');
}

function startLessonForCurrent() {
  startLesson('quiz', currentRecipeId);
}

function startFlashcardForCurrent() {
  startFlashcards(currentRecipeId);
}

// ===== QUESTION GENERATORS =====
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function rand(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getWrongAmounts(correct, isSmall) {
  const nums = [10, 15, 20, 25, 30, 40, 50, 60, 70, 80, 100, 110, 140, 150, 180, 200, 220, 260];
  return shuffle(nums.filter(n => n !== correct)).slice(0, 3).map(n => n + ' г');
}

function makeQuizQuestion(recipe) {
  const ing = rand(recipe.ingredients.filter(i => i.bigNum > 0.25));
  const isSmall = Math.random() > 0.5;
  const correct = isSmall ? ing.small : ing.big;
  const size = isSmall ? 'малую' : 'большую';

  let wrongOptions = [];
  if (ing.unit === 'шт') {
    const wrongNums = [0.5, 1, 2, 3, 4].filter(n => n !== (isSmall ? ing.smallNum : ing.bigNum));
    wrongOptions = shuffle(wrongNums).slice(0, 3).map(n => n < 1 ? '½ шт' : n + ' шт');
  } else {
    wrongOptions = getWrongAmounts(isSmall ? ing.smallNum : ing.bigNum, isSmall);
  }

  const options = shuffle([correct, ...wrongOptions.slice(0, 3)]);

  return {
    type: 'quiz',
    questionType: 'Угадай граммовку',
    question: `${recipe.emoji} ${recipe.name} — ${size} порция\n\nСколько нужно:\n«${ing.name}»?`,
    options,
    correct,
    detail: `${ing.name}: бол. ${ing.big} / мал. ${ing.small}`,
    recipe,
  };
}

function makeWhichRecipeQuestion(allRecipes) {
  const recipe = rand(allRecipes);
  const uniqueIng = recipe.ingredients.find(i =>
    !allRecipes.filter(r => r.id !== recipe.id).some(r =>
      r.ingredients.some(ri => ri.name === i.name)
    )
  ) || rand(recipe.ingredients.filter(i => !['Лапша (сырая/отварная) пф', 'Нори', 'Яйцо маринованное пф', 'Ростки сои маринованные пф', 'Грибы шиитаке отварные пф', 'Лук зеленый очищ. пф'].includes(i.name)));

  const wrongRecipes = shuffle(allRecipes.filter(r => r.id !== recipe.id)).slice(0, 3);
  const options = shuffle([recipe, ...wrongRecipes]);

  return {
    type: 'which',
    questionType: 'Какой это рецепт?',
    question: `В каком рамэне используется:\n«${uniqueIng.name}»?`,
    options: options.map(r => r.emoji + ' ' + r.name),
    correct: recipe.emoji + ' ' + recipe.name,
    detail: `Это ингредиент рецепта "${recipe.name}"`,
    recipe,
  };
}

function makeMissingQuestion(recipe) {
  const allNames = recipe.ingredients.map(i => i.name);
  const correct = rand(allNames);
  const wrongPool = RECIPES.flatMap(r => r.ingredients.map(i => i.name)).filter(n => !allNames.includes(n));
  const wrongs = shuffle([...new Set(wrongPool)]).slice(0, 3);
  const options = shuffle([correct, ...wrongs]);

  return {
    type: 'missing',
    questionType: 'Что забыли добавить?',
    question: `${recipe.emoji} ${recipe.name}\n\nКакой из этих ингредиентов входит в рецепт?`,
    options,
    correct,
    detail: `«${correct}» — ингредиент рецепта "${recipe.name}"`,
    recipe,
  };
}

function makeFlashcard(recipe) {
  return {
    type: 'flashcard',
    recipe,
  };
}

// ===== LESSON MANAGEMENT =====
function startLesson(mode, recipeId) {
  const questions = [];

  if (mode === 'flashcard') {
    const recipes = recipeId !== undefined ? [RECIPES[recipeId]] : RECIPES;
    recipes.forEach(r => questions.push(makeFlashcard(r)));
  } else {
    const targetRecipes = recipeId !== undefined ? [RECIPES[recipeId]] : RECIPES;
    const count = 8;

    for (let i = 0; i < count; i++) {
      const recipe = rand(targetRecipes);
      if (mode === 'quiz' || mode === 'all') {
        questions.push(makeQuizQuestion(recipe));
      } else if (mode === 'which') {
        questions.push(makeWhichRecipeQuestion(RECIPES));
      } else if (mode === 'missing') {
        questions.push(makeMissingQuestion(recipe));
      }
    }
  }

  lessonState = {
    questions: shuffle(questions),
    current: 0,
    hearts: 3,
    correctCount: 0,
    earnedXP: 0,
    selectedAnswer: null,
    answered: false,
    mode,
    targetRecipeId: recipeId,
  };

  renderLesson();
  showScreen('lesson');
}

function startRandomLesson(mode) {
  startLesson(mode, undefined);
}

function startFlashcards(recipeId) {
  startLesson('flashcard', recipeId);
}

// ===== TIMER =====
const TIMER_SECONDS = 15;
const CIRCUMFERENCE = 2 * Math.PI * 18; // r=18 → ~113.1
let timerInterval = null;
let timerLeft = TIMER_SECONDS;

function startTimer() {
  stopTimer();
  timerLeft = TIMER_SECONDS;
  renderTimerUI();
  timerInterval = setInterval(() => {
    timerLeft--;
    renderTimerUI();
    if (timerLeft <= 0) {
      stopTimer();
      onTimerExpired();
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function renderTimerUI() {
  const arc = document.getElementById('timerArc');
  const num = document.getElementById('timerNum');
  const wrap = document.getElementById('timerWrap');
  if (!arc) return;

  const ratio = timerLeft / TIMER_SECONDS;
  const offset = CIRCUMFERENCE * (1 - ratio);
  arc.style.strokeDashoffset = offset;
  num.textContent = timerLeft;

  const isWarn   = timerLeft <= 8 && timerLeft > 4;
  const isDanger = timerLeft <= 4;

  arc.className  = 'timer-arc' + (isDanger ? ' danger' : isWarn ? ' warn' : '');
  num.className  = 'timer-num' + (isDanger ? ' danger' : isWarn ? ' warn' : '');

  if (timerLeft <= 4 && timerLeft > 0) {
    wrap.classList.remove('pulse');
    void wrap.offsetWidth;
    wrap.classList.add('pulse');
  }
}

function hideTimer() {
  const wrap = document.getElementById('timerWrap');
  if (wrap) wrap.style.visibility = 'hidden';
}
function showTimer() {
  const wrap = document.getElementById('timerWrap');
  if (wrap) wrap.style.visibility = '';
}

function onTimerExpired() {
  if (lessonState.answered) return;
  const q = lessonState.questions[lessonState.current];
  if (q.type === 'flashcard') return;

  // auto-fail: mark all disabled, highlight correct
  lessonState.answered = true;
  lessonState.selectedAnswer = null;
  document.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.value === q.correct) b.classList.add('correct');
  });
  showFeedback(false, q, true);
}

// ===== LESSON RENDER =====
function renderLesson() {
  const q = lessonState.questions[lessonState.current];
  const total = lessonState.questions.length;
  const pct = (lessonState.current / total) * 100;

  document.getElementById('lessonProgress').style.width = pct + '%';

  const hearts = document.getElementById('heartsDisplay');
  hearts.innerHTML = [0,1,2].map(i =>
    `<span class="heart ${i >= lessonState.hearts ? 'lost' : ''}">❤️</span>`
  ).join('');

  const body = document.getElementById('lessonBody');
  const feedback = document.getElementById('feedbackBar');
  const bottom = document.getElementById('lessonBottom');

  feedback.style.display = 'none';
  feedback.className = 'feedback-bar';
  bottom.style.display = '';

  lessonState.answered = false;
  lessonState.selectedAnswer = null;

  if (q.type === 'flashcard') {
    hideTimer();
    renderFlashcard(q, body, bottom);
  } else {
    showTimer();
    renderMultiChoice(q, body, bottom);
    startTimer();
  }
}

function renderMultiChoice(q, body, bottom) {
  const letters = ['А', 'Б', 'В', 'Г'];
  body.innerHTML = `
    <div class="question-type">${q.questionType}</div>
    <div class="question-text">${q.question.replace(/\n/g, '<br>')}</div>
    <div class="options-grid">
      ${q.options.map((opt, i) => `
        <button class="option-btn" onclick="selectOption(this, '${opt.replace(/'/g, "\\'")}')" data-value="${opt.replace(/"/g, '&quot;')}">
          <span class="option-letter">${letters[i]}</span>
          ${opt}
        </button>
      `).join('')}
    </div>
  `;

  const checkBtn = document.getElementById('btnCheck');
  checkBtn.disabled = true;
  checkBtn.textContent = 'ПРОВЕРИТЬ';
  bottom.style.display = '';
}

function renderFlashcard(q, body, bottom) {
  const r = q.recipe;
  const ingList = r.ingredients.slice(0, 8).map(i =>
    `<div class="ing-row"><span class="ing-name">${i.name}</span><span class="ing-amount">${i.big} / ${i.small}</span></div>`
  ).join('');

  body.innerHTML = `
    <div class="question-type">Флешкарта — нажми чтобы перевернуть</div>
    <div class="flashcard-container" id="fc" onclick="flipCard()">
      <div class="flashcard-inner">
        <div class="flashcard-front">
          <div class="fc-emoji">${r.emoji}</div>
          <div class="fc-name">${r.name}</div>
          <div style="font-size:0.85rem; color:rgba(255,255,255,0.6); font-weight:600;">${r.sub}</div>
          <div class="fc-hint">👆 Нажми, чтобы увидеть состав</div>
        </div>
        <div class="flashcard-back">
          <div class="fc-title">${r.emoji} ${r.name} — Состав</div>
          <div class="ingredients-list">${ingList}</div>
          <div style="font-size:0.7rem; color:#777; margin-top:0.5rem; font-weight:700;">Выход: ${r.output}</div>
        </div>
      </div>
    </div>
  `;

  const checkBtn = document.getElementById('btnCheck');
  checkBtn.disabled = false;
  checkBtn.textContent = 'СЛЕДУЮЩАЯ →';
  bottom.style.display = '';
}

function flipCard() {
  document.getElementById('fc').classList.toggle('flipped');
}

// ===== INTERACTION =====
function selectOption(btn, value) {
  if (lessonState.answered) return;
  lessonState.selectedAnswer = value;

  document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');

  document.getElementById('btnCheck').disabled = false;
}

function checkAnswer() {
  if (lessonState.answered) return;
  const q = lessonState.questions[lessonState.current];

  if (q.type === 'flashcard') {
    nextQuestion();
    return;
  }

  lessonState.answered = true;
  stopTimer();
  document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);

  const isCorrect = lessonState.selectedAnswer === q.correct;

  document.querySelectorAll('.option-btn').forEach(b => {
    if (b.dataset.value === q.correct) b.classList.add('correct');
    else if (b.dataset.value === lessonState.selectedAnswer && !isCorrect) b.classList.add('wrong');
  });

  showFeedback(isCorrect, q);
}

function showFeedback(isCorrect, q, timedOut = false) {
  const bar = document.getElementById('feedbackBar');
  const title = document.getElementById('feedbackTitle');
  const detail = document.getElementById('feedbackDetail');
  const btn = document.getElementById('btnContinue');
  const bottom = document.getElementById('lessonBottom');

  bottom.style.display = 'none';
  bar.style.display = 'flex';

  if (isCorrect) {
    bar.className = 'feedback-bar correct';
    // bonus XP for speed
    const bonus = timerLeft >= 10 ? 5 : timerLeft >= 5 ? 2 : 0;
    const xpGain = 10 + bonus;
    title.textContent = rand(['🎉 Верно!', '✅ Правильно!', '🔥 Отлично!', '⭐ Молодец!'])
      + (bonus > 0 ? ` (+${bonus} за скорость)` : '');
    detail.textContent = q.detail || '';
    btn.className = 'btn-continue correct';
    lessonState.correctCount++;
    lessonState.earnedXP += xpGain;
    state.correct++;
    showXP(`+${xpGain} XP`);
  } else {
    bar.className = 'feedback-bar wrong';
    title.textContent = timedOut ? '⏰ Время вышло! Правильный ответ:' : '❌ Не так! Правильный ответ:';
    detail.textContent = q.correct + (q.detail ? ' — ' + q.detail : '');
    btn.className = 'btn-continue wrong';
    lessonState.hearts--;
    if (lessonState.hearts <= 0) lessonState.hearts = 0;
    updateHearts();

    const lessonEl = document.getElementById('lesson');
    lessonEl.classList.add('shake');
    setTimeout(() => lessonEl.classList.remove('shake'), 400);
  }

  btn.textContent = lessonState.current < lessonState.questions.length - 1 ? 'ДАЛЕЕ →' : 'ЗАВЕРШИТЬ →';
}

function updateHearts() {
  const hearts = document.getElementById('heartsDisplay');
  hearts.innerHTML = [0,1,2].map(i =>
    `<span class="heart ${i >= lessonState.hearts ? 'lost' : ''}">❤️</span>`
  ).join('');
}

function nextQuestion() {
  lessonState.current++;

  if (lessonState.hearts <= 0 || lessonState.current >= lessonState.questions.length) {
    showResults();
    return;
  }

  renderLesson();
}

function showXP(text) {
  const popup = document.getElementById('xpPopup');
  popup.textContent = text;
  popup.classList.add('show');
  setTimeout(() => popup.classList.remove('show'), 1500);
}

// ===== RESULTS =====
function showResults() {
  stopTimer();
  state.xp += lessonState.earnedXP;
  if (lessonState.correctCount > 0) state.streak++;
  else state.streak = 0;

  if (lessonState.targetRecipeId !== undefined) {
    const pct = Math.round((lessonState.correctCount / Math.max(lessonState.questions.length, 1)) * 100);
    const current = state.recipeProgress[lessonState.targetRecipeId] || 0;
    state.recipeProgress[lessonState.targetRecipeId] = Math.min(100, Math.max(current, pct));
  }

  saveState();

  const accuracy = Math.round((lessonState.correctCount / Math.max(lessonState.questions.length, 1)) * 100);

  document.getElementById('resultTrophy').textContent = accuracy >= 80 ? '🏆' : accuracy >= 50 ? '⭐' : '💪';
  document.getElementById('resultTitle').textContent = accuracy >= 80 ? 'Отлично!' : accuracy >= 50 ? 'Хорошо!' : 'Продолжай!';
  document.getElementById('resultSub').textContent = `Точность ${accuracy}% • ${lessonState.correctCount} из ${lessonState.questions.length} верно`;
  document.getElementById('resXP').textContent = '+' + lessonState.earnedXP;
  document.getElementById('resCorrect').textContent = lessonState.correctCount;
  document.getElementById('resHearts').textContent = lessonState.hearts;

  showScreen('results');
}

function restartLesson() {
  startLesson(lessonState.mode, lessonState.targetRecipeId);
}

// ===== INIT =====
renderHome();
</script>
