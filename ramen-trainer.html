<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍜 ASIATIQ — Рамэн Тренер</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- XP Popup -->
<div class="xp-popup" id="xpPopup">+10 XP ⭐</div>

<!-- ===== HOME SCREEN ===== -->
<div class="screen active" id="home">
  <div class="home-header">
    <div class="logo-bowl">🍜</div>
    <div class="logo-title">ASIATIQ TRAINER</div>
    <div class="logo-sub">РАМЭН • АКАДЕМИЯ</div>
  </div>

  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-icon">🔥</div>
      <div class="stat-value" id="streakDisplay">0</div>
      <div class="stat-label">Серия</div>
    </div>
    <div class="stat-item">
      <div class="stat-icon">⭐</div>
      <div class="stat-value" id="xpDisplay">0</div>
      <div class="stat-label">Очки</div>
    </div>
    <div class="stat-item">
      <div class="stat-icon">✅</div>
      <div class="stat-value" id="correctDisplay">0</div>
      <div class="stat-label">Верных</div>
    </div>
  </div>

  <div class="section-label">Выбери рецепт для изучения</div>
  <div class="recipe-list" id="recipeList"></div>

  <div class="section-label" style="color: rgba(255,255,255,0.4);">Режимы тренировки</div>
  <div class="btn-modes">
    <button class="mode-btn" onclick="startRandomLesson('quiz')">
      <span class="mode-icon">❓</span>
      <span>Угадай граммовку</span>
      <span class="mode-label">Проверь знание грамм</span>
    </button>
    <button class="mode-btn" onclick="startRandomLesson('which')">
      <span class="mode-icon">🎯</span>
      <span>Какой рецепт?</span>
      <span class="mode-label">Угадай по ингредиенту</span>
    </button>
    <button class="mode-btn" onclick="startRandomLesson('missing')">
      <span class="mode-icon">🧩</span>
      <span>Что забыли?</span>
      <span class="mode-label">Найди пропущенный</span>
    </button>
    <button class="mode-btn" onclick="startFlashcards()">
      <span class="mode-icon">📚</span>
      <span>Флешкарты</span>
      <span class="mode-label">Все рецепты</span>
    </button>
    <button class="mode-btn" onclick="showShelfLife()" style="grid-column:1/-1; background:rgba(255,200,0,0.12); border-color:rgba(255,200,0,0.3);">
      <span class="mode-icon">⏱️</span>
      <span>Сроки годности</span>
      <span class="mode-label">Учи и проверяй сроки хранения</span>
    </button>
  </div>
</div>

<!-- ===== RECIPE DETAIL SCREEN ===== -->
<div class="screen" id="recipe-detail">
  <div class="recipe-header">
    <button class="back-btn" onclick="showHome()">←</button>
    <div class="rh-emoji" id="rdEmoji">🍜</div>
    <div class="rh-text">
      <div class="rh-name" id="rdName">Рецепт</div>
      <div class="rh-sub" id="rdSub">Описание</div>
    </div>
  </div>
  <div class="recipe-content" id="rdContent"></div>
  <div class="recipe-actions">
    <button class="btn-study primary" onclick="startLessonForCurrent()">🎯 Тренировать этот рецепт</button>
    <button class="btn-study secondary" onclick="startFlashcardForCurrent()">📚 Флешкарты</button>
  </div>
</div>

<!-- ===== LESSON SCREEN ===== -->
<div class="screen" id="lesson">
  <div class="lesson-top">
    <button class="btn-close" onclick="confirmClose()">✕</button>
    <div class="progress-track">
      <div class="progress-fill" id="lessonProgress" style="width:0%"></div>
    </div>
    <!-- circular countdown timer -->
    <div class="timer-wrap" id="timerWrap">
      <svg class="timer-svg" width="44" height="44" viewBox="0 0 44 44">
        <circle class="timer-bg" cx="22" cy="22" r="18"/>
        <circle class="timer-arc" id="timerArc" cx="22" cy="22" r="18"
          stroke-dasharray="113.1" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-num" id="timerNum">15</div>
    </div>
    <div class="hearts" id="heartsDisplay">
      <span class="heart">❤️</span>
      <span class="heart">❤️</span>
      <span class="heart">❤️</span>
    </div>
  </div>

  <div class="lesson-body" id="lessonBody"></div>

  <div class="feedback-bar" id="feedbackBar">
    <div class="feedback-title" id="feedbackTitle"></div>
    <div class="feedback-detail" id="feedbackDetail"></div>
    <button class="btn-continue" id="btnContinue" onclick="nextQuestion()">ДАЛЕЕ →</button>
  </div>

  <div class="lesson-bottom" id="lessonBottom">
    <button class="btn-check" id="btnCheck" onclick="checkAnswer()" disabled>ПРОВЕРИТЬ</button>
  </div>
</div>

<!-- ===== RESULTS SCREEN ===== -->
<div class="screen" id="results">
  <div class="result-trophy" id="resultTrophy">🏆</div>
  <div class="result-title" id="resultTitle">Отлично!</div>
  <div class="result-sub" id="resultSub">Урок пройден</div>
  <div class="result-stats">
    <div class="result-stat">
      <div class="result-stat-icon">⭐</div>
      <div class="result-stat-value" id="resXP">0</div>
      <div class="result-stat-label">XP</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-icon">✅</div>
      <div class="result-stat-value" id="resCorrect">0</div>
      <div class="result-stat-label">Верно</div>
    </div>
    <div class="result-stat">
      <div class="result-stat-icon">❤️</div>
      <div class="result-stat-value" id="resHearts">0</div>
      <div class="result-stat-label">Жизни</div>
    </div>
  </div>
  <button class="btn-again" onclick="restartLesson()">ЕЩЁ РАЗ</button>
  <button class="btn-home" onclick="showHome()">НА ГЛАВНУЮ</button>
</div>

<!-- ===== SHELF LIFE SCREEN ===== -->
<div class="screen" id="shelf-life">
  <div class="sl-header">
    <button class="back-btn" onclick="showHome()" style="background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:white;font-size:1.1rem;padding:0.35rem 0.65rem;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;">←</button>
    <h2>⏱️ Сроки годности</h2>
    <button class="sl-btn primary" style="flex:none;padding:0.5rem 1rem;font-size:0.8rem;" onclick="startShelfLifeQuiz()">🎯 Тест</button>
  </div>
  <div class="sl-tabs" id="slTabs"></div>
  <div class="sl-content" id="slContent"></div>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
